<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="#00FFFF" stroke-width="4" filter="url(#glow)"/>
  <polygon points="50,20 80,50 50,80 20,50" fill="#00FFFF" opacity="0.15"/>
  <text x="50" y="58" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#00FFFF" filter="url(#glow)">AR</text>
</svg>
